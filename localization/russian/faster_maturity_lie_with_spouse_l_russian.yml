 # Lie With Spouse Interaction
 lie_with_spouse_interaction: "Возлечь с супругом"
 lie_with_spouse_interaction_name: "Возлечь с супругом"
 lie_with_spouse_interaction_name_duty: "Исполнить супружеский долг"
 lie_with_spouse_interaction_name_lustful: "Утолить свои желания"
 lie_with_spouse_interaction_name_seducer: "Соблазнить супруга"
 lie_with_spouse_interaction_desc: "Возлечь со своим супругом"
 lie_with_spouse_interaction_desc_duty: "Исполните супружеский долг со своим супругом, стремясь зачать наследника"
 lie_with_spouse_interaction_desc_lustful: "Возьмите своего супруга в постель с необузданным желанием, стремясь как к наслаждению, так и к зачатию наследника"
 lie_with_spouse_interaction_desc_seducer: "Заключите своего супруга в интимные объятия, где страсть и цель сплетаются в зачатии наследника"

 # Lie With Spouse Events
 lie_with_spouse.1.t: "Удовольствие Продолжения Рода"
 lie_with_spouse.2.t: "Удовольствие Продолжения Рода"
 lie_with_spouse.1.desc: "Я провёл всю ночь со своим супругом. Наши соки как следует смешались, и, без сомнения, зарождается ребёнок."
 lie_with_spouse.1.desc_duty: "Я исполнил свой долг перед Богом и династией. Мы возлегли вместе, и я молюсь, чтобы за этим последовал наследник."
 lie_with_spouse.1.desc_lustful: "Ночь была полна необузданной страсти. Я овладел своим супругом с неукротимым желанием, и теперь мы ждём, что принесёт нам судьба."
 lie_with_spouse.1.desc_seducer: "С отточенным очарованием я привлёк своего супруга к себе. Ночь прошла так, как я и задумывал, и теперь природа должна взять своё."
 lie_with_spouse.2.desc: "Он провёл всю ночь со мной. Наши соки как следует смешались, и, без сомнения, зарождается ребёнок."
 lie_with_spouse.2.desc_duty: "Я исполнила свой долг как жена. Мы возлегли вместе, и я молюсь, чтобы за этим последовал наследник."
 lie_with_spouse.2.desc_lustful: "Ночь была полна необузданной страсти. Мой муж овладел мной с неукротимым желанием, и теперь мы ждём, что принесёт нам судьба."
 lie_with_spouse.2.desc_seducer: "Я привлекла своего мужа к себе отточенным очарованием. Ночь прошла так, как я и задумывала, и теперь природа должна взять своё."
 lie_with_spouse.1.a: "Аах...."
 lie_with_spouse.2.a: "Аах...."

