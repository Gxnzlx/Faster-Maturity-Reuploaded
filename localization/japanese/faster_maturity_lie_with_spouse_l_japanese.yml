 # Lie With Spouse Interaction
 lie_with_spouse_interaction: "配偶者と褥を共にする"
 lie_with_spouse_interaction_name: "配偶者と褥を共にする"
 lie_with_spouse_interaction_name_duty: "夫婦の務めを果たす"
 lie_with_spouse_interaction_name_lustful: "欲望を満たす"
 lie_with_spouse_interaction_name_seducer: "配偶者を誘惑する"
 lie_with_spouse_interaction_desc: "配偶者と褥を共にします"
 lie_with_spouse_interaction_desc_duty: "世継ぎを授かることを願い、配偶者と夫婦の務めを果たします"
 lie_with_spouse_interaction_desc_lustful: "抑えきれぬ欲望のままに配偶者を寝所へ誘い、快楽と世継ぎの懐妊の両方を求めます"
 lie_with_spouse_interaction_desc_seducer: "配偶者を親密な抱擁へと引き寄せ、情熱と目的が世継ぎの懐妊の中で絡み合います"

 # Lie With Spouse Events
 lie_with_spouse.1.t: "生殖の悦び"
 lie_with_spouse.2.t: "生殖の悦び"
 lie_with_spouse.1.desc: "一晩中配偶者と共に過ごした。我々の体液は十分に混ざり合い、きっと子が宿るだろう。"
 lie_with_spouse.1.desc_duty: "神と王朝に対する務めを果たした。我々は共に褥を共にし、世継ぎが授かることを祈る。"
 lie_with_spouse.1.desc_lustful: "その夜は抑えきれぬ情熱に満ちていた。私は抑制のない欲望のままに配偶者を抱き、今や運命が何をもたらすかを待つばかりだ。"
 lie_with_spouse.1.desc_seducer: "熟練した魅力で配偶者を引き寄せた。夜は私の思い通りに過ぎ去り、今や自然の成り行きに任せるしかない。"
 lie_with_spouse.2.desc: "彼は一晩中私と共に過ごした。我々の体液は十分に混ざり合い、きっと子が宿るだろう。"
 lie_with_spouse.2.desc_duty: "妻としての務めを果たした。我々は共に褥を共にし、世継ぎが授かることを祈る。"
 lie_with_spouse.2.desc_lustful: "その夜は抑えきれぬ情熱に満ちていた。夫は抑制のない欲望のままに私を抱き、今や運命が何をもたらすかを待つばかりだ。"
 lie_with_spouse.2.desc_seducer: "熟練した魅力で夫を引き寄せた。夜は私の思い通りに過ぎ去り、今や自然の成り行きに任せるしかない。"
 lie_with_spouse.1.a: "あぁ…"
 lie_with_spouse.2.a: "あぁ…"

