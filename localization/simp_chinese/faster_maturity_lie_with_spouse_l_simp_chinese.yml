 # Lie With Spouse Events
 lie_with_spouse.1.t: "繁衍之乐"
 lie_with_spouse.2.t: "繁衍之乐"
 lie_with_spouse.1.desc: "我与配偶共度了整夜。我们的体液已充分交融，孩子必定正在孕育之中。"
 lie_with_spouse.1.desc_duty: "我已履行了对上帝与王朝的义务。我们同床共枕，我祈求继承人随之而来。"
 lie_with_spouse.1.desc_lustful: "那一夜充满了不羁的激情。我带着无法克制的欲望占有了配偶，如今我们静候命运的安排。"
 lie_with_spouse.1.desc_seducer: "凭借娴熟的魅力，我将配偶拥入怀中。夜晚如我所愿地展开，如今只需顺其自然。"
 lie_with_spouse.2.desc: "他与我共度了整夜。我们的体液已充分交融，孩子必定正在孕育之中。"
