l_korean:

 # Lie With Spouse Interaction
 lie_with_spouse_interaction: "배우자와 잠자리를 갖는다"
 lie_with_spouse_interaction_name: "배우자와 잠자리 갖기"
 lie_with_spouse_interaction_name_duty: "혼인의 의무 다하기"
 lie_with_spouse_interaction_name_lustful: "욕망을 충족시키기"
 lie_with_spouse_interaction_name_seducer: "배우자를 유혹하기"
 lie_with_spouse_interaction_desc: "당신의 배우자와 잠자리를 갖습니다"
 lie_with_spouse_interaction_desc_duty: "후계자를 얻기 위해 배우자와 혼인의 의무를 다합니다"
 lie_with_spouse_interaction_desc_lustful: "억누를 수 없는 욕망으로 배우자를 침대로 이끌어, 쾌락과 후계자 잉태를 동시에 추구합니다"
 lie_with_spouse_interaction_desc_seducer: "배우자를 은밀한 포옹으로 이끌어, 열정과 목적이 후계자 잉태 속에서 얽히게 합니다"

 # Lie With Spouse Events
 lie_with_spouse.1.t: "생식의 즐거움"
 lie_with_spouse.2.t: "생식의 즐거움"
 lie_with_spouse.1.desc: "나는 배우자와 밤새 함께했다. 우리의 체액이 충분히 섞였으니 분명 아이가 생길 것이다."
 lie_with_spouse.1.desc_duty: "나는 신과 왕조에 대한 의무를 다했다. 우리는 함께 잠자리를 가졌고, 나는 후계자가 뒤따르기를 기도한다."
 lie_with_spouse.1.desc_lustful: "그 밤은 억누를 수 없는 열정으로 가득했다. 나는 걷잡을 수 없는 욕망으로 배우자를 취했고, 이제 운명이 무엇을 가져올지 기다린다."
 lie_with_spouse.1.desc_seducer: "능숙한 매력으로 나는 배우자를 가까이 끌어당겼다. 밤은 내가 의도한 대로 흘러갔고, 이제 자연이 그 순리를 따라야 한다."
 lie_with_spouse.2.desc: "그는 밤새 나와 함께했다. 우리의 체액이 충분히 섞였으니 분명 아이가 생길 것이다."
 lie_with_spouse.2.desc_duty: "나는 아내로서의 의무를 다했다. 우리는 함께 잠자리를 가졌고, 나는 후계자가 뒤따르기를 기도한다."
 lie_with_spouse.2.desc_lustful: "그 밤은 억누를 수 없는 열정으로 가득했다. 내 남편은 걷잡을 수 없는 욕망으로 나를 취했고, 이제 운명이 무엇을 가져올지 기다린다."
 lie_with_spouse.2.desc_seducer: "나는 능숙한 매력으로 남편을 가까이 끌어당겼다. 밤은 내가 의도한 대로 흘러갔고, 이제 자연이 그 순리를 따라야 한다."
 lie_with_spouse.1.a: "아흐...."
 lie_with_spouse.2.a: "아흐...."

 # Opinion Modifiers
 lie_with_spouse_opinion: "그의 혼인 의무를 다했다"
 lie_with_spouse_female_opinion: "우리의 혼인 의무를 다했다"
