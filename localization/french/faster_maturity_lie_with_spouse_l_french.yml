 lie_with_spouse.1.desc_lustful: "La nuit fut emplie d'une passion débridée. J'ai pris mon épouse/époux avec un désir sans retenue, et nous attendons désormais ce que le destin nous réserve."
 lie_with_spouse.1.desc_seducer: "Avec un charme éprouvé, j'ai attiré mon épouse/époux contre moi. La nuit s'est déroulée comme je l'avais prévu, et à présent la nature doit suivre son cours."
 lie_with_spouse.2.desc: "Il a passé toute la nuit avec moi. Nos essences se sont mêlées en profondeur, et un enfant est certainement en train de naître."
