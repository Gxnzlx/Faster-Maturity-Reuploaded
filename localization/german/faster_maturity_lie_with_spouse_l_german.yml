 # Lie With Spouse Events
 lie_with_spouse.1.t: "Die Freude der Fortpflanzung"
 lie_with_spouse.2.t: "Die Freude der Fortpflanzung"
 lie_with_spouse.1.desc: "Ich habe die ganze Nacht mit meinem Ehepartner verbracht. Unsere Säfte haben sich gründlich vermischt, und sicherlich braut sich ein Kind zusammen."
 lie_with_spouse.1.desc_duty: "Ich habe meine Pflicht gegenüber Gott und Dynastie gleichermaßen erfüllt. Wir haben zusammen gelegen, und ich bete, dass ein Erbe folgen möge."
 lie_with_spouse.1.desc_lustful: "Die Nacht war erfüllt von ungezügelter Leidenschaft. Ich nahm meinen Ehepartner mit hemmungslosem Verlangen, und nun erwarten wir, was das Schicksal bringen mag."
 lie_with_spouse.1.desc_seducer: "Mit geübtem Charme zog ich meinen Ehepartner nah zu mir. Die Nacht verlief, wie ich es beabsichtigt hatte, und nun muss die Natur ihren Lauf nehmen."
 lie_with_spouse.2.desc: "Er verbrachte die ganze Nacht mit mir. Unsere Säfte haben sich gründlich vermischt, und sicherlich braut sich ein Kind zusammen."
 lie_with_spouse.2.desc_duty: "Ich habe meine Pflicht als Ehefrau erfüllt. Wir haben zusammen gelegen, und ich bete, dass ein Erbe folgen möge."
 lie_with_spouse.2.desc_lustful: "Die Nacht war erfüllt von ungezügelter Leidenschaft. Mein Ehemann nahm mich mit hemmungslosem Verlangen, und nun erwarten wir, was das Schicksal bringen mag."
 lie_with_spouse.2.desc_seducer: "Ich zog meinen Ehemann mit geübtem Charme nah zu mir. Die Nacht verlief, wie ich es beabsichtigt hatte, und nun muss die Natur ihren Lauf nehmen."
