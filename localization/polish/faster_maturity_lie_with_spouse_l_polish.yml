 # Lie With Spouse Interaction
 lie_with_spouse_interaction: "Połóż się z małżonkiem"
 lie_with_spouse_interaction_name: "Połóż się z małżonkiem"
 lie_with_spouse_interaction_name_duty: "Spełnij powinność małżeńską"
 lie_with_spouse_interaction_name_lustful: "Zaspokój swoje pragnienia"
 lie_with_spouse_interaction_name_seducer: "Uwiedź swojego małżonka"
 lie_with_spouse_interaction_desc: "Połóż się ze swoim małżonkiem"
 lie_with_spouse_interaction_desc_duty: "Spełnij swoją powinność małżeńską ze swoim małżonkiem, dążąc do spłodzenia dziedzica"
 lie_with_spouse_interaction_desc_lustful: "Zabierz swojego małżonka do łóżka z niepohamowanym pożądaniem, dążąc zarówno do przyjemności, jak i spłodzenia dziedzica"
 lie_with_spouse_interaction_desc_seducer: "Wciągnij swojego małżonka w intymny uścisk, gdzie namiętność i cel splatają się w spłodzeniu dziedzica"

 # Lie With Spouse Events
 lie_with_spouse.1.t: "Rozkosz Prokreacji"
 lie_with_spouse.2.t: "Rozkosz Prokreacji"
 lie_with_spouse.1.desc: "Spędziłem całą noc z moim małżonkiem. Nasze płyny dokładnie się zmieszały i z pewnością rodzi się dziecko."
 lie_with_spouse.1.desc_duty: "Wypełniłem swój obowiązek wobec Boga i dynastii. Legliśmy razem i modlę się, by narodził się dziedzic."
 lie_with_spouse.1.desc_lustful: "Noc była pełna niepohamowanej namiętności. Wziąłem swojego małżonka z nieokiełznanym pożądaniem, a teraz czekamy na to, co przyniesie los."
 lie_with_spouse.1.desc_seducer: "Wyćwiczonym urokiem przyciągnąłem swojego małżonka blisko siebie. Noc potoczyła się tak, jak zamierzałem, a teraz natura musi zrobić swoje."
 lie_with_spouse.2.desc: "Spędził całą noc ze mną. Nasze płyny dokładnie się zmieszały i z pewnością rodzi się dziecko."
 lie_with_spouse.2.desc_duty: "Wypełniłam swój obowiązek jako żona. Legliśmy razem i modlę się, by narodził się dziedzic."
 lie_with_spouse.2.desc_lustful: "Noc była pełna niepohamowanej namiętności. Mój mąż wziął mnie z nieokiełznanym pożądaniem, a teraz czekamy na to, co przyniesie los."
 lie_with_spouse.2.desc_seducer: "Przyciągnęłam swojego męża blisko siebie wyćwiczonym urokiem. Noc potoczyła się tak, jak zamierzałam, a teraz natura musi zrobić swoje."
 lie_with_spouse.1.a: "Ahh...."
 lie_with_spouse.2.a: "Ahh...."

